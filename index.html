<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課後功課輔導班點名系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.js"></script>
</head>
<body>

    <!-- 頁首 -->
    <header class="page-header">
        <h1 class="page-title">
            <i class="fas fa-check-circle logo"></i>
            點名系統
        </h1>
        <nav class="main-actions">
            <a href="#" id="manage-classes-btn" class="action-link"><i class="fas fa-chalkboard-user"></i> 班級管理</a>
            <a href="#" id="manage-students-btn" class="action-link"><i class="fas fa-users"></i> 學生管理</a>
            <a href="#" id="view-report-btn" class="action-link"><i class="fas fa-chart-line"></i> 檢視報告</a>
        </nav>
    </header>

    <div class="layout-container">

        <!-- 選擇班級與日期 -->
        <div class="card">
            <div class="controls-grid">
                <div class="form-group">
                    <label>選擇班級</label>
                    <div id="class-buttons-container" class="class-buttons-container">
                        <div class="loader">載入中...</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="attendance-date">選擇日期</label>
                    <input type="date" id="attendance-date" class="date-picker">
                </div>
            </div>
        </div>

        <!-- 學生名單 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title-icon"><i class="fas fa-user-graduate"></i></div>
                <h3 class="card-title">學生名單</h3>
            </div>
            <div id="attendance-list-container">
                <div class="empty-state">
                    <i class="fas fa-hand-pointer"></i>
                    請先選擇班級與日期
                </div>
            </div>
        </div>

    </div>

    <!-- 彈窗 -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close-btn" class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

</body>
</html>
