<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課後功課輔導班點名系統</title>
    <!-- 引入圖示庫 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 Excel 匯出工具 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- 引入 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* --- 設計變數 --- */
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #eef2ff;
            --success-color: #10b981;
            --success-light: #ecfdf5;
            --danger-color: #f43f5e;
            --danger-light: #fff1f2;
            --info-color: #3b82f6;

            --background-color: #f1f5f9;
            --card-bg-color: #ffffff;

            --text-color: #0f172a;
            --text-muted-color: #64748b;
            --border-color: #e2e8f0;

            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;

            --border-radius: 0.75rem;
            --border-radius-sm: 0.5rem;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        /* --- 全局樣式 --- */
        * { box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: var(--font-heading);
            color: var(--text-color);
        }

        /* --- 頁首 --- */
        .page-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #ffffff;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
        }

        .page-title .logo {
            font-size: 1.4rem;
            opacity: 0.9;
        }

        .main-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.1);
        }

        .action-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* --- 主佈局 --- */
        .layout-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* --- 卡片 --- */
        .card {
            background: var(--card-bg-color);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.1rem;
            margin: 0;
            font-weight: 600;
            color: var(--text-color);
        }

        .card-title-icon {
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            background: var(--primary-light);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* --- 表單和控制項 --- */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted-color);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.8px;
        }

        .date-picker, .form-control, select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            font-size: 0.95rem;
            border-radius: var(--border-radius-sm);
            border: 1.5px solid var(--border-color);
            background-color: var(--card-bg-color);
            color: var(--text-color);
            transition: all 0.2s;
            font-family: var(--font-body);
        }

        .date-picker:focus, .form-control:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .class-buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .class-btn {
            padding: 0.5rem 1.1rem;
            font-size: 0.9rem;
            border: 1.5px solid var(--border-color);
            background-color: var(--card-bg-color);
            color: var(--text-muted-color);
            cursor: pointer;
            border-radius: 2rem;
            transition: all 0.2s;
            font-family: var(--font-body);
            font-weight: 500;
        }

        .class-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-light);
        }

        .class-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        /* --- 學生名單 --- */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .student-card {
            display: grid;
            grid-template-columns: minmax(120px, 1.5fr) 2fr 1fr;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-radius: var(--border-radius-sm);
            border: 1.5px solid var(--border-color);
            background-color: var(--card-bg-color);
            transition: all 0.2s;
        }

        .student-card:hover {
            border-color: #c7d2fe;
            box-shadow: var(--shadow-sm);
        }

        .student-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
        }

        /* --- 出席開關按鈕 --- */
        .attendance-toggle {
            display: flex;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            border: 1.5px solid var(--border-color);
        }

        .toggle-btn {
            flex-grow: 1;
            padding: 0.55rem 0.75rem;
            border: none;
            background-color: transparent;
            color: var(--text-muted-color);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-family: var(--font-body);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .toggle-btn:first-child {
            border-right: 1.5px solid var(--border-color);
        }

        .toggle-btn:hover {
            background-color: #f8fafc;
        }

        .toggle-btn.present.active {
            background-color: var(--success-color);
            color: white;
        }

        .toggle-btn.absent.active {
            background-color: var(--danger-color);
            color: white;
        }

        /* --- 得分按鈕 --- */
        .score-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 0.35rem;
        }

        .score-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border-color);
            background-color: transparent;
            color: var(--text-muted-color);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-body);
        }

        .score-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-light);
        }

        .score-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.3);
        }

        /* --- 其他組件 --- */
        .loader, .empty-state {
            padding: 2.5rem;
            text-align: center;
            color: var(--text-muted-color);
            font-size: 0.95rem;
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
            opacity: 0.4;
        }

        /* --- 動畫 --- */
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to   { transform: translateX(0);     opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0);     opacity: 1; }
            to   { transform: translateX(400px); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- 彈窗 Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
            padding: 1rem;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--card-bg-color);
            padding: 0;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 700px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.96) translateY(8px);
            transition: transform 0.25s ease;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: #fafafa;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-color);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted-color);
            line-height: 1;
            transition: color 0.2s;
            padding: 0.25rem;
            border-radius: 0.35rem;
        }

        .modal-close:hover {
            color: var(--text-color);
            background: var(--border-color);
        }

        .modal-body {
            overflow: auto;
            padding: 1.5rem;
        }

        /* --- 按鈕 --- */
        .btn {
            padding: 0.6rem 1.25rem;
            border: 1.5px solid transparent;
            border-radius: var(--border-radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-body);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
        }

        .btn-danger:hover {
            background-color: #e11d48;
            border-color: #e11d48;
            box-shadow: 0 2px 8px rgba(244, 63, 94, 0.25);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .btn-success:hover {
            background-color: #059669;
            border-color: #059669;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
        }

        .btn-ghost {
            background-color: transparent;
            color: var(--text-muted-color);
            border-color: var(--border-color);
        }

        .btn-ghost:hover {
            background-color: var(--border-color);
            color: var(--text-color);
        }

        .btn-sm {
            padding: 0.3rem 0.65rem;
            font-size: 0.8rem;
        }

        /* --- 管理彈窗 --- */
        .management-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .management-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1rem;
            border-radius: var(--border-radius-sm);
            background-color: #fafbfc;
            border: 1.5px solid var(--border-color);
            transition: all 0.2s;
        }

        .management-list-item:hover {
            border-color: #c7d2fe;
            background-color: var(--primary-light);
        }

        .management-list-item:not(:last-child) {
            margin-bottom: 0.5rem;
        }

        .management-list-item-name {
            flex-grow: 1;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .management-list-item-actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
            margin-left: 1rem;
        }

        /* --- 報告表格 --- */
        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 12px;
            table-layout: fixed;
        }

        .report-table th, .report-table td {
            border: 1px solid var(--border-color);
            padding: 6px 4px;
            text-align: center;
            width: 35px;
        }

        .report-table th {
            background-color: var(--primary-light);
            color: var(--primary-color);
            font-weight: 600;
        }

        .report-table th:first-child, .report-table td:first-child {
            width: 100px;
            text-align: left;
            padding-left: 8px;
            font-weight: 500;
            position: sticky;
            left: 0;
            background-color: #f8f9ff;
            border-right: 2px solid var(--border-color);
        }

        .report-table th:last-child, .report-table td:last-child {
            width: 80px;
            font-weight: bold;
            position: sticky;
            right: 0;
            background-color: #f8f9ff;
            border-left: 2px solid var(--border-color);
        }

        /* --- 響應式設計 --- */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                padding: 1rem;
            }

            .layout-container {
                padding: 1rem;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }

            .student-card {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .attendance-toggle {
                width: 100%;
            }

            .score-buttons {
                justify-content: center;
            }

            .management-form {
                flex-direction: column;
            }

            .management-form .form-control {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <!-- 頁首 -->
    <header class="page-header">
        <h1 class="page-title">
            <i class="fas fa-check-circle logo"></i>
            點名系統
        </h1>
        <nav class="main-actions">
            <a href="#" id="manage-classes-btn" class="action-link"><i class="fas fa-chalkboard-user"></i> 班級管理</a>
            <a href="#" id="manage-students-btn" class="action-link"><i class="fas fa-users"></i> 學生管理</a>
            <a href="#" id="view-report-btn" class="action-link"><i class="fas fa-chart-line"></i> 檢視報告</a>
        </nav>
    </header>

    <div class="layout-container">

        <!-- 選擇班級與日期 -->
        <div class="card">
            <div class="controls-grid">
                <div class="form-group">
                    <label>選擇班級</label>
                    <div id="class-buttons-container" class="class-buttons-container">
                        <div class="loader">載入中...</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="attendance-date">選擇日期</label>
                    <input type="date" id="attendance-date" class="date-picker">
                </div>
            </div>
        </div>

        <!-- 學生名單 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title-icon"><i class="fas fa-user-graduate"></i></div>
                <h3 class="card-title">學生名單</h3>
            </div>
            <div id="attendance-list-container">
                <div class="empty-state">
                    <i class="fas fa-hand-pointer"></i>
                    請先選擇班級與日期
                </div>
            </div>
        </div>

    </div>

    <!-- 彈窗容器 -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close-btn" class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>


    <script>
        // --- Firebase 初始化 ---
        let db;

        async function initializeFirebase() {
            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyAdgbMNLMdvxKHsheXOrLLDow8N_bwZ5o8",
                    authDomain: "schoolattendencesystem-d6e6a.firebaseapp.com",
                    projectId: "schoolattendencesystem-d6e6a",
                    storageBucket: "schoolattendencesystem-d6e6a.appspot.com",
                    messagingSenderId: "852662856414",
                    appId: "1:852662856414:web:d9127ce4541c9af562304f"
                };

                if (!firebaseConfig.projectId) {
                    throw new Error("Firebase 設定無效或不完整。");
                }

                firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                db = firebase.firestore();

                await auth.signInAnonymously();
                console.log("Firebase 驗證成功。");
                return true;
            } catch (error) {
                console.error("Firebase 初始化失敗:", error);
                let userMessage = `<h2>Firebase 連線失敗</h2>`;
                if (error.message.includes("設定無效")) {
                    userMessage += `<p>Firebase 設定資訊不完整或不正確，無法初始化應用程式。</p>`;
                } else {
                    userMessage += `<p>無法連接到後端服務，請檢查您的網路連線或設定。</p><p><small>錯誤詳情: ${error.message}</small></p>`;
                }
                document.body.innerHTML = `<div style="text-align:center; padding: 40px; color: #f43f5e;">${userMessage}</div>`;
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', async function () {

            const isFirebaseReady = await initializeFirebase();
            if (!isFirebaseReady) return;

            // --- DOM 元素 ---
            const dateInput = document.getElementById('attendance-date');
            const listContainer = document.getElementById('attendance-list-container');
            const classButtonsContainer = document.getElementById('class-buttons-container');
            const modalContainer = document.getElementById('modal-container');
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');
            const modalCloseBtn = document.getElementById('modal-close-btn');

            // --- 應用程式狀態 ---
            let currentClassId = null;
            let classesCache = [];

            // --- 工具函數 ---
            function getTodayDateString() {
                const today = new Date();
                const offset = today.getTimezoneOffset();
                const localDate = new Date(today.getTime() - (offset * 60 * 1000));
                return localDate.toISOString().split('T')[0];
            }

            function showNotification(message, type = 'success', duration = 3000) {
                const colors = {
                    success: 'var(--success-color)',
                    error: 'var(--danger-color)',
                    info: 'var(--info-color)'
                };
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 0.85rem 1.25rem;
                    background-color: ${colors[type] || colors.info};
                    color: white;
                    border-radius: 0.6rem;
                    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
                    z-index: 2000;
                    font-weight: 500;
                    font-size: 0.9rem;
                    animation: slideIn 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                if (duration > 0) {
                    setTimeout(() => {
                        notification.style.animation = 'slideOut 0.3s ease';
                        setTimeout(() => notification.remove(), 300);
                    }, duration);
                }

                return notification;
            }

            // --- Modal 函數 ---
            function showModal(title, content) {
                modalTitle.textContent = title;
                modalBody.innerHTML = content;
                modalContainer.classList.add('show');
            }

            function hideModal() {
                modalContainer.classList.remove('show');
            }

            function showConfirmationModal(title, message, onConfirm) {
                const content = `
                    <p style="color: var(--text-muted-color); margin-top: 0;">${message}</p>
                    <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                        <button id="confirm-cancel-btn" class="btn btn-ghost">取消</button>
                        <button id="confirm-ok-btn" class="btn btn-danger">確定刪除</button>
                    </div>
                `;
                showModal(title, content);
                document.getElementById('confirm-ok-btn').addEventListener('click', onConfirm);
                document.getElementById('confirm-cancel-btn').addEventListener('click', hideModal);
            }

            // --- 報告功能 ---
            function showReportModal() {
                const today = new Date();
                const currentYear = today.getFullYear();
                const currentMonth = String(today.getMonth() + 1).padStart(2, '0');

                const content = `
                    <div style="display: flex; gap: 0.75rem; margin-bottom: 1rem;">
                        <input type="month" id="report-month" class="date-picker" value="${currentYear}-${currentMonth}" style="flex: 1;">
                        <button id="generate-report-btn" class="btn btn-primary"><i class="fas fa-chart-bar"></i> 產生報告</button>
                    </div>
                    <div id="report-output" style="max-height: 60vh; overflow-y: auto;"></div>`;
                showModal('全校月度報告', content);
                document.getElementById('generate-report-btn').addEventListener('click', generateFirebaseReport);
            }

            async function generateFirebaseReport() {
                const reportOutput = document.getElementById('report-output');
                const monthInput = document.getElementById('report-month').value;
                if (!monthInput) {
                    alert("請先選擇月份");
                    return;
                }
                reportOutput.innerHTML = `<div class="loader">報告產生中...</div>`;

                const [year, month] = monthInput.split('-').map(Number);
                const startDate = `${monthInput}-01`;
                const lastDay = new Date(year, month, 0).getDate();
                const endDate = `${monthInput}-${String(lastDay).padStart(2, '0')}`;

                try {
                    const [classesSnap, studentsSnap, recordsSnap] = await Promise.all([
                        db.collection('classes').orderBy('order').get(),
                        db.collection('students').orderBy('order').get(),
                        db.collection('records').where('date', '>=', startDate).where('date', '<=', endDate).get()
                    ]);

                    const studentMap = new Map(studentsSnap.docs.map(doc => [doc.id, doc.data()]));
                    const allDbClasses = classesSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    const reportData = {};
                    recordsSnap.forEach(doc => {
                        const data = doc.data();
                        const { classId, studentId, date, status, score } = data;
                        if (!classId || !studentId || !date) return;
                        if (!reportData[classId]) reportData[classId] = {};
                        if (!reportData[classId][studentId]) reportData[classId][studentId] = {};
                        reportData[classId][studentId][date] = { status, score };
                    });

                    if (recordsSnap.empty) {
                        reportOutput.innerHTML = `<div class="empty-state"><i class="fas fa-file-alt"></i><p>該月份沒有任何記錄。</p></div>`;
                        return;
                    }

                    let grandTotalAttendance = 0;
                    let grandTotalScore = 0;
                    const excelAttendanceData = {};
                    const excelScoreData = {};
                    let attendanceHtml = '<h2>出席報告</h2>';
                    let scoreHtml = '<h2 style="margin-top: 2.5rem;">得分報告</h2>';

                    // 欄位字母預先計算（在外層避免重複計算）
                    const firstDataCol = 'B';

                    allDbClasses.forEach(cls => {
                        const studentsDataForClass = reportData[cls.id];
                        if (!studentsDataForClass || Object.keys(studentsDataForClass).length === 0) return;

                        const studentIdsInClass = Object.keys(studentsDataForClass);
                        const studentsInClass = studentIdsInClass.map(studentId => {
                            const studentInfo = studentMap.get(studentId);
                            return {
                                id: studentId,
                                name: studentInfo ? studentInfo.name : `(已刪除學生 ID: ${studentId.substring(0, 5)})`,
                                order: studentInfo ? studentInfo.order : 999
                            };
                        }).sort((a, b) => a.order - b.order || a.name.localeCompare(b.name));

                        if (studentsInClass.length === 0) return;

                        const lastDataCol = XLSX.utils.encode_col(lastDay);
                        const attSheetData = [];
                        const scoreSheetData = [];

                        let attTableHtml = `<h3 style="margin-top: 24px; margin-bottom: 12px; text-align: center;">${cls.name} - 出席報告</h3>`;
                        attTableHtml += `<table class="report-table">`;
                        let scoreTableHtml = `<h3 style="margin-top: 24px; margin-bottom: 12px; text-align: center;">${cls.name} - 得分報告</h3>`;
                        scoreTableHtml += `<table class="report-table">`;

                        let attHeader = '<thead><tr><th>學生姓名</th>';
                        let attExcelHeader = ['學生姓名'];
                        let scoreHeader = '<thead><tr><th>學生姓名</th>';
                        let scoreExcelHeader = ['學生姓名'];

                        for (let day = 1; day <= lastDay; day++) {
                            attHeader += `<th>${day}</th>`;
                            attExcelHeader.push(String(day));
                            scoreHeader += `<th>${day}</th>`;
                            scoreExcelHeader.push(String(day));
                        }
                        attHeader += '<th>出席總計</th></tr></thead>';
                        attExcelHeader.push('出席總計');
                        attSheetData.push(attExcelHeader);

                        scoreHeader += '<th>得分總計</th></tr></thead>';
                        scoreExcelHeader.push('得分總計');
                        scoreSheetData.push(scoreExcelHeader);

                        attTableHtml += attHeader;
                        scoreTableHtml += scoreHeader;

                        let attTableBody = '<tbody>';
                        let scoreTableBody = '<tbody>';

                        const dailyTotals = Array(lastDay + 1).fill(0);
                        const dailyScoreTotals = Array(lastDay + 1).fill(0);
                        let classTotal = 0;
                        let classScoreTotal = 0;

                        studentsInClass.forEach((student, i) => {
                            const rowIndex = i + 2;
                            let attRow = `<tr><td>${student.name}</td>`;
                            let scoreRow = `<tr><td>${student.name}</td>`;
                            let studentTotal = 0;
                            let studentScoreTotal = 0;
                            let attExcelRow = [student.name];
                            let scoreExcelRow = [student.name];

                            for (let day = 1; day <= lastDay; day++) {
                                const dateStr = `${monthInput}-${String(day).padStart(2, '0')}`;
                                const record = studentsDataForClass[student.id][dateStr];

                                let attCellContent = '';
                                let scoreCellContent = '';
                                let scoreValue = null;

                                if (record && record.status === 'present') {
                                    attCellContent = '✓';
                                    studentTotal++;
                                    dailyTotals[day]++;

                                    if (typeof record.score === 'number') {
                                        scoreCellContent = String(record.score);
                                        scoreValue = record.score;
                                        studentScoreTotal += record.score;
                                        dailyScoreTotals[day] += record.score;
                                    }
                                }
                                attRow += `<td>${attCellContent}</td>`;
                                attExcelRow.push(attCellContent);
                                scoreRow += `<td>${scoreCellContent}</td>`;
                                scoreExcelRow.push(scoreValue);
                            }

                            attRow += `<td>${studentTotal}</td></tr>`;
                            scoreRow += `<td>${studentScoreTotal}</td></tr>`;

                            attExcelRow.push({ f: `COUNTIF(${firstDataCol}${rowIndex}:${lastDataCol}${rowIndex},"✓")` });
                            scoreExcelRow.push({ f: `SUM(${firstDataCol}${rowIndex}:${lastDataCol}${rowIndex})` });

                            attSheetData.push(attExcelRow);
                            attTableBody += attRow;
                            scoreSheetData.push(scoreExcelRow);
                            scoreTableBody += scoreRow;

                            classTotal += studentTotal;
                            classScoreTotal += studentScoreTotal;
                        });

                        const totalRowIndex = studentsInClass.length + 2;
                        const firstDataRow = 2;
                        const lastDataRow = totalRowIndex - 1;
                        const totalColName = XLSX.utils.encode_col(lastDay + 1);

                        // 出席總計列 (HTML)
                        attTableBody += '<tr style="font-weight: bold; background-color: #eef2ff;"><td>當日出席總計</td>';
                        for (let day = 1; day <= lastDay; day++) {
                            attTableBody += `<td>${dailyTotals[day]}</td>`;
                        }
                        attTableBody += `<td>${classTotal}</td></tr></tbody>`;
                        attTableHtml += attTableBody + '</table>';

                        // 出席總計列 (Excel)
                        let attExcelTotalRow = ['當日出席總計'];
                        for (let day = 1; day <= lastDay; day++) {
                            const colName = XLSX.utils.encode_col(day);
                            attExcelTotalRow.push({ f: `COUNTIF(${colName}${firstDataRow}:${colName}${lastDataRow},"✓")` });
                        }
                        attExcelTotalRow.push({ f: `SUM(${totalColName}${firstDataRow}:${totalColName}${lastDataRow})` });
                        attSheetData.push(attExcelTotalRow);

                        // 得分總計列 (HTML)
                        scoreTableBody += '<tr style="font-weight: bold; background-color: #eef2ff;"><td>當日得分總計</td>';
                        for (let day = 1; day <= lastDay; day++) {
                            scoreTableBody += `<td>${dailyScoreTotals[day]}</td>`;
                        }
                        scoreTableBody += `<td>${classScoreTotal}</td></tr></tbody>`;
                        scoreTableHtml += scoreTableBody + '</table>';

                        // 得分總計列 (Excel)
                        let scoreExcelTotalRow = ['當日得分總計'];
                        for (let day = 1; day <= lastDay; day++) {
                            const colName = XLSX.utils.encode_col(day);
                            scoreExcelTotalRow.push({ f: `SUM(${colName}${firstDataRow}:${colName}${lastDataRow})` });
                        }
                        scoreExcelTotalRow.push({ f: `SUM(${totalColName}${firstDataRow}:${totalColName}${lastDataRow})` });
                        scoreSheetData.push(scoreExcelTotalRow);

                        excelAttendanceData[cls.name] = attSheetData;
                        excelScoreData[cls.name] = scoreSheetData;
                        attendanceHtml += attTableHtml;
                        scoreHtml += scoreTableHtml;

                        grandTotalAttendance += classTotal;
                        grandTotalScore += classScoreTotal;
                    });

                    if (grandTotalAttendance === 0 && grandTotalScore === 0) {
                        reportOutput.innerHTML = `<div class="empty-state"><i class="fas fa-file-alt"></i><p>該月份沒有任何記錄。</p></div>`;
                    } else {
                        const summary = `
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; padding: 10px 0 16px;">
                                <div style="font-size: 0.95rem; font-weight: 600;">
                                    全校總出席: <span style="color: var(--success-color);">${grandTotalAttendance}</span> &nbsp;|&nbsp;
                                    總得分: <span style="color: var(--primary-color);">${grandTotalScore}</span>
                                </div>
                                <button id="export-excel-btn" class="btn btn-success"><i class="fas fa-file-excel"></i> 匯出 Excel</button>
                            </div>`;
                        reportOutput.innerHTML = summary + attendanceHtml + scoreHtml;
                        document.getElementById('export-excel-btn').addEventListener('click', () => exportReportToExcel(excelAttendanceData, excelScoreData));
                    }

                } catch (error) {
                    console.error("Error generating report:", error);
                    reportOutput.innerHTML = `<div class="empty-state"><p style="color:var(--danger-color);">報告產生失敗，請檢查網絡連線或稍後再試。</p></div>`;
                }
            }

            function exportReportToExcel(attendanceData, scoreData) {
                if ((!attendanceData || Object.keys(attendanceData).length === 0) && (!scoreData || Object.keys(scoreData).length === 0)) {
                    alert('沒有報告資料可匯出');
                    return;
                }
                if (typeof XLSX === 'undefined') {
                    alert('Excel 匯出功能載入失敗，請檢查您的網路連線或重新整理頁面。');
                    return;
                }

                const wb = XLSX.utils.book_new();

                for (const className in attendanceData) {
                    if (Object.prototype.hasOwnProperty.call(attendanceData, className)) {
                        const sheetData = attendanceData[className];
                        const ws = XLSX.utils.aoa_to_sheet(sheetData);
                        const cols = [{ wch: 20 }, ...Array(sheetData[0].length - 2).fill({ wch: 4 }), { wch: 12 }];
                        ws['!cols'] = cols;
                        XLSX.utils.book_append_sheet(wb, ws, `${className.substring(0, 20)} - 出席報告`);
                    }
                }

                for (const className in scoreData) {
                    if (Object.prototype.hasOwnProperty.call(scoreData, className)) {
                        const sheetData = scoreData[className];
                        const ws = XLSX.utils.aoa_to_sheet(sheetData);
                        const cols = [{ wch: 20 }, ...Array(sheetData[0].length - 2).fill({ wch: 4 }), { wch: 12 }];
                        ws['!cols'] = cols;
                        XLSX.utils.book_append_sheet(wb, ws, `${className.substring(0, 20)} - 得分報告`);
                    }
                }

                const monthInput = document.getElementById('report-month').value;
                XLSX.writeFile(wb, `全校月度報告-${monthInput}.xlsx`);
            }

            // --- 主要應用程式邏輯 ---
            async function loadClasses() {
                classButtonsContainer.innerHTML = '<div class="loader">載入中...</div>';
                try {
                    const querySnapshot = await db.collection('classes').orderBy('order').get();
                    classesCache = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    classButtonsContainer.innerHTML = '';
                    if (classesCache.length === 0) {
                        listContainer.innerHTML = `<div class="empty-state"><i class="fas fa-chalkboard"></i><p>沒有班級資料。請先「管理班級」新增。</p></div>`;
                        return;
                    }

                    classesCache.forEach(cls => {
                        const button = document.createElement('button');
                        button.className = 'class-btn';
                        button.textContent = cls.name;
                        button.dataset.classId = cls.id;
                        button.addEventListener('click', handleClassButtonClick);
                        classButtonsContainer.appendChild(button);
                    });

                    const firstBtn = classButtonsContainer.querySelector('.class-btn');
                    if (firstBtn) firstBtn.click();

                } catch (error) {
                    console.error("Error loading classes: ", error);
                    let errorMessage = `<p>班級加載失敗，請檢查網絡連線或瀏覽器開發者工具中的錯誤訊息。</p>`;
                    if (error.code === 'permission-denied' || error.code === 'unauthenticated') {
                        errorMessage = `<p style="font-weight: bold;">權限不足</p><p>無法讀取班級資料。請檢查您的 Firestore 安全性規則。</p>`;
                    } else if (error.code === 'failed-precondition') {
                        errorMessage = `<p style="font-weight: bold;">缺少索引</p><p>請打開瀏覽器的開發者工具 (按 F12)，在 Console 中找到 Firebase 錯誤訊息，裡面會包含一個<b>建立索引的連結</b>。點擊該連結即可解決。</p>`;
                    }
                    classButtonsContainer.innerHTML = `<div class="empty-state" style="padding: 1rem; color:var(--danger-color); text-align: left;">${errorMessage}</div>`;
                }
            }

            function handleClassButtonClick(event) {
                const clickedButton = event.currentTarget;
                currentClassId = clickedButton.dataset.classId;
                document.querySelectorAll('.class-btn').forEach(btn => btn.classList.remove('active'));
                clickedButton.classList.add('active');
                loadStudentData();
            }

            async function loadStudentData() {
                const selectedDate = dateInput.value;
                if (!currentClassId) {
                    listContainer.innerHTML = `<div class="empty-state"><i class="fas fa-chalkboard"></i><p>請先選擇一個班級。</p></div>`;
                    return;
                }
                if (!selectedDate) {
                    listContainer.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-alt"></i><p>請選擇點名日期。</p></div>`;
                    return;
                }

                listContainer.innerHTML = '<div class="loader">載入中...</div>';

                try {
                    const studentsSnap = await db.collection('students')
                        .where('classId', '==', currentClassId)
                        .orderBy('order')
                        .get();
                    const studentsInClass = studentsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                    if (studentsInClass.length === 0) {
                        listContainer.innerHTML = `<div class="empty-state"><i class="fas fa-user-graduate"></i><p>這個班級目前沒有學生。</p></div>`;
                        return;
                    }

                    const studentIds = studentsInClass.map(s => s.id);
                    const recordsSnap = await db.collection('records')
                        .where('date', '==', selectedDate)
                        .where('studentId', 'in', studentIds)
                        .get();

                    const recordsMap = {};
                    recordsSnap.forEach(doc => {
                        const data = doc.data();
                        recordsMap[data.studentId] = data;
                    });

                    renderStudentList(studentsInClass, recordsMap);

                } catch (error) {
                    console.error("Error loading students or records: ", error);
                    let errorMessage = `<p>學生資料加載失敗，請檢查網絡連線。</p>`;
                    if (error.code === 'failed-precondition') {
                        errorMessage = `<p style="font-weight: bold;">缺少索引 (學生資料)</p><p>Firestore 需要一個複合索引。請打開瀏覽器的開發者工具 (按 F12)，在 Console 的錯誤訊息中找到並點擊 Firebase 提供的<b>索引建立連結</b>。</p>`;
                    } else if (error.code === 'permission-denied') {
                        errorMessage = `<p style="font-weight: bold;">權限不足</p><p>無法讀取學生資料。請檢查您的 Firestore 安全性規則。</p>`;
                    }
                    listContainer.innerHTML = `<div class="empty-state" style="color:var(--danger-color); text-align: left;">${errorMessage}</div>`;
                }
            }

            function renderStudentList(students, recordsMap) {
                listContainer.innerHTML = '<div class="student-list"></div>';
                const studentListElement = listContainer.querySelector('.student-list');

                students.forEach(student => {
                    const record = recordsMap[student.id] || {};
                    const status = record.status || 'unknown';
                    const score = record.score;

                    let scoreButtonsHTML = '';
                    for (let i = 0; i <= 4; i++) {
                        scoreButtonsHTML += `<button class="score-btn ${score === i ? 'active' : ''}" data-student-id="${student.id}" data-score="${i}">${i}</button>`;
                    }

                    const item = document.createElement('div');
                    item.className = 'student-card';
                    item.innerHTML = `
                        <div class="student-name">${student.name}</div>
                        <div class="attendance-toggle">
                            <button class="toggle-btn present ${status === 'present' ? 'active' : ''}" data-student-id="${student.id}" data-status="present"><i class="fas fa-check"></i> 出席</button>
                            <button class="toggle-btn absent ${status === 'absent' ? 'active' : ''}" data-student-id="${student.id}" data-status="absent"><i class="fas fa-times"></i> 缺席</button>
                        </div>
                        <div class="score-buttons">${scoreButtonsHTML}</div>`;
                    studentListElement.appendChild(item);
                });

                listContainer.querySelectorAll('.toggle-btn').forEach(btn => btn.addEventListener('click', handleAttendanceClick));
                listContainer.querySelectorAll('.score-btn').forEach(btn => btn.addEventListener('click', handleScoreClick));
            }

            async function handleAttendanceClick(event) {
                const button = event.currentTarget;
                const { studentId, status } = button.dataset;
                const selectedDate = dateInput.value;
                const recordKey = `${selectedDate}_${studentId}`;
                const parent = button.parentElement;

                if (button.classList.contains('active')) {
                    button.classList.remove('active');
                    try {
                        await db.collection('records').doc(recordKey).update({
                            status: firebase.firestore.FieldValue.delete()
                        });
                        showNotification('已取消出席記錄', 'info', 2000);
                    } catch (error) {
                        console.error("Error removing status: ", error);
                        showNotification('操作失敗，請重試', 'error');
                    }
                    return;
                }

                parent.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                try {
                    const statusText = status === 'present' ? '出席' : '缺席';
                    await db.collection('records').doc(recordKey).set({
                        studentId,
                        date: selectedDate,
                        classId: currentClassId,
                        status
                    }, { merge: true });
                    showNotification(`已標記為${statusText}`, 'success', 2000);
                } catch (error) {
                    console.error("Error updating attendance: ", error);
                    button.classList.remove('active');
                    showNotification('無法更新，網絡異常', 'error');
                }
            }

            async function handleScoreClick(event) {
                const button = event.currentTarget;
                const studentId = button.dataset.studentId;
                const score = parseInt(button.dataset.score, 10);
                const selectedDate = dateInput.value;
                const recordKey = `${selectedDate}_${studentId}`;
                const parent = button.parentElement;

                if (button.classList.contains('active')) {
                    button.classList.remove('active');
                    try {
                        await db.collection('records').doc(recordKey).update({
                            score: firebase.firestore.FieldValue.delete()
                        });
                        showNotification('已移除得分', 'info', 2000);
                    } catch (error) {
                        console.error("Error removing score: ", error);
                        showNotification('操作失敗', 'error');
                    }
                } else {
                    parent.querySelectorAll('.score-btn').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    try {
                        await db.collection('records').doc(recordKey).set({
                            studentId,
                            date: selectedDate,
                            classId: currentClassId,
                            score
                        }, { merge: true });
                        showNotification(`得分已設定為 ${score}`, 'success', 2000);
                    } catch (error) {
                        console.error("Error updating score: ", error);
                        button.classList.remove('active');
                        showNotification('無法更新得分', 'error');
                    }
                }
            }

            // --- 管理功能 ---
            function showEditClassModal(id, currentName, currentOrder) {
                const content = `
                    <div class="form-group">
                        <label for="edit-class-name">班級名稱</label>
                        <input type="text" id="edit-class-name" class="form-control" value="${currentName}" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-class-order">排序</label>
                        <input type="number" id="edit-class-order" class="form-control" value="${currentOrder}" required>
                    </div>
                    <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                        <button id="save-edit-class-btn" class="btn btn-primary"><i class="fas fa-save"></i> 儲存</button>
                    </div>
                `;
                showModal('編輯班級', content);

                document.getElementById('save-edit-class-btn').addEventListener('click', async () => {
                    const newName = document.getElementById('edit-class-name').value.trim();
                    const newOrderInput = document.getElementById('edit-class-order').value;

                    if (!newName || newOrderInput.trim() === '' || isNaN(newOrder)) {

                    try {

                        await loadClasses();
                        hideModal();
                    } catch (error) {
                        console.error("Error updating class:", error);
                        alert('儲存失敗，請檢查主控台錯誤。');
                    }
                });

            async function showClassManagementModal() {
                const content = `
                    <div id="class-management-list" style="max-height: 420px; overflow-y: auto; margin-bottom: 0;"></div>
                    <form id="add-class-form" class="management-form">
                        <input type="text" id="new-class-name" class="form-control" placeholder="新班級名稱" required style="flex-grow: 1;">
                        <input type="number" id="new-class-order" class="form-control" placeholder="排序" value="0" required style="width: 90px;">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> 新增</button>
                    </form>`;
                showModal('班級管理', content);
                await renderClassManagementList();

                document.getElementById('add-class-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const nameInput = document.getElementById('new-class-name');
                    const orderInput = document.getElementById('new-class-order');
                    const name = nameInput.value.trim();
                    const order = parseInt(orderInput.value, 10);

                    if (name && !isNaN(order)) {
                        try {
                            await db.collection('classes').add({ name, order });
                            nameInput.value = '';
                            orderInput.value = 0;
                            await renderClassManagementList();
                            await loadClasses();
                            const listEl = document.getElementById('class-management-list');
                            if (listEl) listEl.scrollTop = listEl.scrollHeight;
                        } catch (error) {
                            console.error("Error adding class:", error);
                        }
                    } else {
                        alert('請輸入有效的班級名稱和排序數字。');
                    }
                });
            }

            async function renderClassManagementList() {
                const listEl = document.getElementById('class-management-list');
                listEl.innerHTML = '<div class="loader">載入中...</div>';
                try {
                    const classSnap = await db.collection('classes').orderBy('order').get();
                    listEl.innerHTML = '';
                    if (classSnap.empty) {
                        listEl.innerHTML = `<div class="empty-state">尚未建立任何班級。</div>`;
                        return;
                    }
                    classSnap.docs.forEach(doc => {
                        const cls = { id: doc.id, ...doc.data() };
                        const item = document.createElement('div');
                        item.className = 'management-list-item';
                        item.innerHTML = `
                            <span class="management-list-item-name">${cls.name} <span style="color: var(--text-muted-color); font-size: 0.8rem;">(排序: ${cls.order})</span></span>
                            <div class="management-list-item-actions">
                                <button class="btn btn-primary btn-sm edit-class-btn" data-id="${cls.id}" data-name="${cls.name}" data-order="${cls.order}"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-danger btn-sm delete-class-btn" data-id="${cls.id}" data-name="${cls.name}"><i class="fas fa-trash"></i></button>
                            </div>`;

                        item.querySelector('.edit-class-btn').addEventListener('click', (e) => {
                            const { id, name, order } = e.currentTarget.dataset;
                            showEditClassModal(id, name, order);
                        });

                        item.querySelector('.delete-class-btn').addEventListener('click', (e) => {
                            const { id, name } = e.currentTarget.dataset;
                            showConfirmationModal('刪除班級', `確定要刪除班級「${name}」嗎？此操作無法復原。`, async () => {
                                try {
                                    await db.collection('classes').doc(id).delete();
                                    await loadClasses();
                                    hideModal();
                                } catch (error) {
                                    console.error("Error deleting class:", error);
                                    alert('刪除失敗。');
                                    hideModal();
                                }
                            });
                        });

                        listEl.appendChild(item);
                    });
                } catch (error) {
                    console.error("Error rendering class list:", error);
                    listEl.innerHTML = `<div class="empty-state" style="color:var(--danger-color);">無法載入班級列表。</div>`;
                }
            }

            function showEditStudentModal(id, currentName, currentClassId, currentOrder) {
                let options = classesCache.map(c =>
                    `<option value="${c.id}" ${c.id === currentClassId ? 'selected' : ''}>${c.name}</option>`
                ).join('');

                const content = `
                    <div class="form-group">
                        <label for="edit-student-name">學生姓名</label>
                        <input type="text" id="edit-student-name" class="form-control" value="${currentName}" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-student-class">班級</label>
                        <select id="edit-student-class" class="form-control">${options}</select>
                    </div>
                    <div class="form-group">
                        <label for="edit-student-order">排序</label>
                        <input type="number" id="edit-student-order" class="form-control" value="${currentOrder}" required>
                    </div>
                    <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                        <button id="save-edit-student-btn" class="btn btn-primary"><i class="fas fa-save"></i> 儲存</button>
                    </div>
                `;
                showModal('編輯學生', content);

                document.getElementById('save-edit-student-btn').addEventListener('click', async () => {
                    const newName = document.getElementById('edit-student-name').value.trim();
                    const newClassId = document.getElementById('edit-student-class').value;
                    const newOrderInput = document.getElementById('edit-student-order').value;
                    const newOrder = parseInt(newOrderInput, 10);

                    if (!newName || !newClassId || newOrderInput.trim() === '' || isNaN(newOrder)) {
                        alert('學生姓名、班級和排序（必須是數字）為必填項。');
                        return;
                    }

                    try {
                        await db.collection('students').doc(id).update({
                            name: newName,
                            classId: newClassId,
                            order: newOrder
                        });
                        await loadStudentData();
                        hideModal();
                    } catch (error) {
                        console.error("Error updating student:", error);
                        alert('儲存失敗，請檢查主控台錯誤。');
                    }
                });
            }

            async function showStudentManagementModal() {
                if (classesCache.length === 0) {
                    showModal('學生管理', '<div class="empty-state"><i class="fas fa-chalkboard"></i><p>請先在「班級管理」中建立至少一個班級，然後才能新增學生。</p></div>');
                    return;
                }
                let options = classesCache.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                const content = `
                    <div id="student-management-list" style="max-height: 420px; overflow-y: auto; margin-bottom: 0;"></div>
                    <form id="add-student-form" class="management-form">
                        <input type="text" id="new-student-name" class="form-control" placeholder="新學生姓名" required style="flex-grow: 1; min-width: 120px;">
                        <select id="new-student-class" class="form-control" style="width: 140px;">${options}</select>
                        <input type="number" id="new-student-order" class="form-control" placeholder="排序" value="0" required style="width: 80px;">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> 新增</button>
                    </form>`;
                showModal('學生管理', content);
                await renderStudentManagementList();

                document.getElementById('add-student-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const nameInput = document.getElementById('new-student-name');
                    const classId = document.getElementById('new-student-class').value;
                    const orderInput = document.getElementById('new-student-order');
                    const name = nameInput.value.trim();
                    const order = parseInt(orderInput.value, 10);

                    if (name && classId && !isNaN(order)) {
                        try {
                            await db.collection('students').add({ name, classId, order });
                            nameInput.value = '';
                            orderInput.value = 0;
                            await renderStudentManagementList();
                            await loadStudentData();
                            const listEl = document.getElementById('student-management-list');
                            if (listEl) listEl.scrollTop = listEl.scrollHeight;
                        } catch (error) {
                            console.error("Error adding student:", error);
                        }
                    } else {
                        alert('請輸入有效的學生姓名、班級和排序數字。');
                    }
                });
            }

            async function renderStudentManagementList() {
                const listEl = document.getElementById('student-management-list');
                listEl.innerHTML = '<div class="loader">載入中...</div>';
                try {
                    const studentsSnap = await db.collection('students').orderBy('order').get();
                    listEl.innerHTML = '';
                    if (studentsSnap.empty) {
                        listEl.innerHTML = `<div class="empty-state">尚未建立任何學生。</div>`;
                        return;
                    }
                    studentsSnap.docs.forEach(doc => {
                        const student = { id: doc.id, ...doc.data() };
                        const className = classesCache.find(c => c.id === student.classId)?.name || '未知班級';
                        const item = document.createElement('div');
                        item.className = 'management-list-item';
                        item.innerHTML = `
                            <span class="management-list-item-name">${student.name} <span style="color: var(--text-muted-color); font-size: 0.8rem;">(${className} / 排序: ${student.order})</span></span>
                            <div class="management-list-item-actions">
                                <button class="btn btn-primary btn-sm edit-student-btn" data-id="${student.id}" data-name="${student.name}" data-class-id="${student.classId}" data-order="${student.order}"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-danger btn-sm delete-student-btn" data-id="${student.id}" data-name="${student.name}"><i class="fas fa-trash"></i></button>
                            </div>`;

                        item.querySelector('.edit-student-btn').addEventListener('click', (e) => {
                            const { id, name, classId, order } = e.currentTarget.dataset;
                            showEditStudentModal(id, name, classId, order);
                        });

                        item.querySelector('.delete-student-btn').addEventListener('click', (e) => {
                            const { id, name } = e.currentTarget.dataset;
                            showConfirmationModal('刪除學生', `確定要刪除學生「${name}」嗎？`, async () => {
                                try {
                                    await db.collection('students').doc(id).delete();
                                    await loadStudentData();
                                    hideModal();
                                } catch (error) {
                                    console.error("Error deleting student:", error);
                                    alert('刪除失敗。');
                                    hideModal();
                                }
                            });
                        });

                        listEl.appendChild(item);
                    });
                } catch (error) {
                    console.error("Error rendering student list:", error);
                    listEl.innerHTML = `<div class="empty-state" style="color:var(--danger-color);">無法載入學生列表。</div>`;
                }
            }

            // --- 初始化與事件綁定 ---
            function initializeApp() {
                dateInput.value = getTodayDateString();
                loadClasses();

                dateInput.addEventListener('change', loadStudentData);

                document.getElementById('manage-classes-btn').addEventListener('click', (e) => { e.preventDefault(); showClassManagementModal(); });
                document.getElementById('manage-students-btn').addEventListener('click', (e) => { e.preventDefault(); showStudentManagementModal(); });
                document.getElementById('view-report-btn').addEventListener('click', (e) => { e.preventDefault(); showReportModal(); });

                modalCloseBtn.addEventListener('click', hideModal);
                modalContainer.addEventListener('click', (e) => {
                    if (e.target === modalContainer) hideModal();
                });
            }

            initializeApp();
        });
    </script>
</body>
</html>
